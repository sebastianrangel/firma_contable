<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELOHANU Login</title>

    <!-- FUENTE GOOGLE -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-left: #0a0a12;
            --bg-right: #11111e;
            --card: #14141f;
            --text: #ffffff;
            --text-secondary: #8a8aa8;
            --text-muted: #5a5a7a;
            --border: #2a2a3e;
            --primary: #6c5ce7;
            --primary-light: #a29bfe;
            --gradient-1: #6c5ce7;
            --gradient-2: #fd79a8;
            --shadow: rgba(0, 0, 0, 0.5);
            --radius: 16px;
            --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --navbar-bg: rgba(10, 10, 18, 0.85);
            --input-bg: #1a1a2e;
        }

        body.light {
            --bg-left: #f0f2ff;
            --bg-right: #ffffff;
            --card: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #6b6b8a;
            --text-muted: #9a9aba;
            --border: #e0e0f0;
            --shadow: rgba(0, 0, 0, 0.08);
            --navbar-bg: rgba(255, 255, 255, 0.85);
            --input-bg: #f0f2ff;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-right);
            color: var(--text);
            transition: var(--transition);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-right);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            position: sticky;
            top: 0;
            background: var(--navbar-bg);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            padding: 14px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 100;
            transition: var(--transition);
            flex-wrap: wrap;
            gap: 10px;
        }

        .nav-logo {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 6px;
            list-style: none;
            flex-wrap: wrap;
        }

        .nav-links li a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 10px;
            transition: var(--transition);
        }

        .nav-links li a:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.06);
        }

        body.light .nav-links li a:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .nav-links li a.active {
            color: var(--primary);
            background: rgba(108, 92, 231, 0.12);
        }

        body.light .nav-links li a.active {
            background: rgba(108, 92, 231, 0.08);
        }

        /* ===== CONTAINER LOGIN ===== */
        .container-login {
            display: flex;
            min-height: calc(100vh - 72px);
            position: relative;
        }

        /* ===== THEME TOGGLE ===== */
        .theme-toggle-login {
            position: absolute;
            top: 24px;
            right: 30px;
            z-index: 10;
        }

        .switch {
            width: 52px;
            height: 28px;
            background: var(--border);
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            transition: var(--transition);
            border: none;
        }

        .switch::before {
            content: "🌙";
            display: flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 3px;
            left: 3px;
            transition: var(--transition);
            font-size: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        body.light .switch {
            background: var(--primary);
        }

        body.light .switch::before {
            content: "☀️";
            left: 27px;
        }

        /* ===== LEFT LOGIN ===== */
        .left-login {
            width: 50%;
            background: var(--bg-left);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 40px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .left-login::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(108, 92, 231, 0.06), transparent 70%);
            top: -200px;
            right: -200px;
            border-radius: 50%;
        }

        .left-login::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(253, 121, 168, 0.04), transparent 70%);
            bottom: -150px;
            left: -150px;
            border-radius: 50%;
        }

        .login-form {
            width: 100%;
            max-width: 380px;
            position: relative;
            z-index: 1;
        }

        .logo-title-login {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle-login {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
            letter-spacing: 0.5px;
        }

        .input-box-login {
            margin-bottom: 18px;
        }

        .input-box-login label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .input-box-login label i {
            margin-right: 8px;
            color: var(--primary);
        }

        .input-box-login input {
            width: 100%;
            padding: 12px 14px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            outline: none;
        }

        .input-box-login input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.12);
        }

        .input-box-login input::placeholder {
            color: var(--text-muted);
        }

        .forgot-login {
            display: block;
            text-align: right;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            margin-bottom: 24px;
            transition: var(--transition);
        }

        .forgot-login:hover {
            color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login {
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
            color: white;
            margin-bottom: 12px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(108, 92, 231, 0.35);
        }

        .btn-register {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-register:hover {
            background: var(--input-bg);
            color: var(--text);
            border-color: var(--primary);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .social-login {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .social-login a {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
            font-size: 18px;
        }

        .social-login a:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }

        /* ===== RIGHT LOGIN ===== */
        .right-login {
            width: 50%;
            background: var(--bg-right);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .right-login::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(108, 92, 231, 0.05), transparent 70%);
            top: -100px;
            left: -100px;
            border-radius: 50%;
        }

        .logo-box-login {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .mountain-login {
            width: 80px;
            height: 80px;
            border-left: 4px solid var(--primary);
            border-top: 4px solid var(--primary);
            transform: rotate(45deg);
            margin: 0 auto 20px;
            position: relative;
            opacity: 0.8;
        }

        .mountain-login::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border-left: 4px solid var(--gradient-2);
            border-top: 4px solid var(--gradient-2);
            top: 18px;
            left: 32px;
        }

        .logo-text-login {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .business-login {
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 12px;
            color: var(--text-secondary);
        }

        .right-decoration {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--text-muted);
            font-size: 12px;
            letter-spacing: 2px;
            opacity: 0.5;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .navbar {
                padding: 12px 24px;
            }

            .left-login {
                padding: 30px 24px;
            }

            .logo-title-login {
                font-size: 34px;
            }

            .login-form {
                max-width: 340px;
            }

            .logo-text-login {
                font-size: 38px;
            }
        }

        @media (max-width: 820px) {
            .navbar {
                flex-direction: column;
                padding: 12px 20px;
                gap: 8px;
            }

            .nav-links {
                justify-content: center;
                gap: 4px;
            }

            .nav-links li a {
                font-size: 13px;
                padding: 6px 12px;
            }

            .container-login {
                flex-direction: column;
                min-height: auto;
            }

            .left-login {
                width: 100%;
                min-height: 60vh;
                padding: 40px 24px;
            }

            .right-login {
                width: 100%;
                min-height: 40vh;
                padding: 40px 24px;
            }

            .login-form {
                max-width: 400px;
            }

            .theme-toggle-login {
                top: 16px;
                right: 20px;
            }

            .logo-text-login {
                font-size: 32px;
            }

            .business-login {
                font-size: 16px;
                letter-spacing: 8px;
            }

            .mountain-login {
                width: 60px;
                height: 60px;
            }

            .mountain-login::after {
                width: 30px;
                height: 30px;
                top: 14px;
                left: 24px;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                padding: 10px 16px;
            }

            .nav-logo {
                font-size: 22px;
            }

            .nav-links li a {
                font-size: 11px;
                padding: 4px 10px;
            }

            .left-login {
                padding: 30px 16px;
                min-height: 50vh;
            }

            .right-login {
                min-height: 30vh;
                padding: 30px 16px;
            }

            .logo-title-login {
                font-size: 28px;
            }

            .subtitle-login {
                font-size: 13px;
                margin-bottom: 24px;
            }

            .input-box-login input {
                padding: 10px 12px;
                font-size: 13px;
            }

            .btn {
                font-size: 14px;
                padding: 11px;
            }

            .switch {
                width: 44px;
                height: 24px;
            }

            .switch::before {
                width: 18px;
                height: 18px;
                font-size: 10px;
            }

            body.light .switch::before {
                left: 23px;
            }

            .logo-text-login {
                font-size: 26px;
                letter-spacing: 4px;
            }

            .business-login {
                font-size: 13px;
                letter-spacing: 6px;
            }

            .mountain-login {
                width: 50px;
                height: 50px;
            }

            .mountain-login::after {
                width: 24px;
                height: 24px;
                top: 12px;
                left: 20px;
            }

            .social-login a {
                width: 38px;
                height: 38px;
                font-size: 15px;
            }

            .right-decoration {
                font-size: 10px;
                bottom: 20px;
            }
        }

        @media (max-width: 360px) {
            .nav-links li a {
                font-size: 10px;
                padding: 3px 8px;
            }

            .logo-title-login {
                font-size: 24px;
            }

            .login-form {
                max-width: 100%;
            }

            .logo-text-login {
                font-size: 22px;
            }

            .business-login {
                font-size: 11px;
                letter-spacing: 4px;
            }
        }

        /* ===== ANIMATION ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-form,
        .logo-box-login {
            animation: fadeInUp 0.6s ease both;
        }

        .login-form { animation-delay: 0.05s; }
        .logo-box-login { animation-delay: 0.15s; }
    </style>
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <a href="ELOHANU_BUSINESS.html" class="nav-logo">ELOHANU</a>

        <ul class="nav-links">
            <li><a href="ELOHANU_BUSINESS.html">Inicio</a></li>
            <li><a href="quienes-somos.html">Quiénes Somos</a></li>
            <li><a href="blog-noticias.html">Blog</a></li>
            <li><a href="contactanos.html">Contáctanos</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="login.html" class="active">Login</a></li>
        </ul>
    </nav>

    <!-- ===== CONTAINER LOGIN ===== -->
    <div class="container-login">

        <!-- TEMA -->
        <div class="theme-toggle-login">
            <button class="switch" id="toggle" aria-label="Cambiar tema"></button>
        </div>

        <!-- LEFT -->
        <div class="left-login">
            <div class="login-form">
                <h1 class="logo-title-login">ELOHANU</h1>
                <p class="subtitle-login">Plataforma de Asesoría Contable</p>

                <div class="input-box-login">
                    <label><i class="fas fa-user"></i> Usuario</label>
                    <input type="text" placeholder="Ingresa tu usuario">
                </div>

                <div class="input-box-login">
                    <label><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" placeholder="Ingresa tu contraseña">
                </div>

                <a href="#" class="forgot-login">¿Olvidaste tu contraseña?</a>

                <button class="btn btn-login">
                    <i class="fas fa-sign-in-alt"></i> INICIAR SESIÓN
                </button>

                <div class="divider">o continuar con</div>

                <div class="social-login">
                    <a href="#" aria-label="Google"><i class="fab fa-google"></i></a>
                    <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" aria-label="Apple"><i class="fab fa-apple"></i></a>
                    <a href="#" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                </div>

                <div style="margin-top:20px; text-align:center;">
                    <button class="btn btn-register">
                        <i class="fas fa-user-plus"></i> REGISTRARSE
                    </button>
                </div>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="right-login">
            <div class="logo-box-login">
                <div class="mountain-login"></div>
                <div class="logo-text-login">ELOHANU</div>
                <div class="business-login">BUSINESS</div>
            </div>
            <div class="right-decoration">✦ Asesoría Contable ✦</div>
        </div>

    </div>

    <!-- ===== SCRIPT ===== -->
    <script>
        const toggle = document.getElementById("toggle");

        // Cargar tema guardado
        const savedTheme = localStorage.getItem('login-theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light');
        }

        toggle.addEventListener("click", () => {
            document.body.classList.toggle("light");
            localStorage.setItem('login-theme',
                document.body.classList.contains('light') ? 'light' : 'dark'
            );
        });
    </script>
</body>
</html>
